<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>PHYSICS MASTER</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#9013FE">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
:root { --primary:#9013FE; --bg:#F8FAFC; --card-dark:#1E293B; --star-color:#FAC827;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Pretendard",sans-serif;height:100vh;overflow:hidden;touch-action:none;}
.page{position:absolute;width:100%;height:100%;display:none;flex-direction:column;background:var(--bg);}
.page.active{display:flex;}
.header{padding:12px 20px;background:white;display:flex;justify-content:space-between;border-bottom:1px solid #e2e8f0;font-weight:800;}
.lobby-content{flex:1;overflow-y:auto;padding:20px;}
.stage-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:12px;}
.stage-btn{background:white;border:1px solid #e2e8f0;height:80px;border-radius:12px;font-weight:700;display:flex;flex-direction:column;justify-content:center;align-items:center;}
.stage-btn:active{transform:scale(0.95);}
.card-wrapper{width:85%;max-width:360px;height:50vh;transform-style:preserve-3d;}
.card-inner{width:100%;height:100%;transition:transform 0.5s;transform-style:preserve-3d;}
.card-inner.flipped{transform:rotateY(180deg);}
.card-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:24px;display:flex;justify-content:center;align-items:center;flex-direction:column;}
.card-front{background:white;}
.card-back{background:#1E293B;color:white;transform:rotateY(180deg);}
.word{font-size:2rem;font-weight:800;}
.meaning{font-size:1.6rem;color:#FAC827;}
.nav-btn{background:white;border:2px solid var(--primary);color:var(--primary);padding:10px 20px;border-radius:20px;font-weight:800;}
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;display:none;justify-content:center;align-items:center;background:rgba(0,0,0,0.5);}
.modal-overlay.visible{display:flex;}
.modal-box{background:white;padding:30px;border-radius:20px;text-align:center;}
</style>
</head>

<body>

<div id="lobby-page" class="page active">
<div class="header">PHYSICS MASTER</div>
<div class="lobby-content">
<div class="stage-grid" id="stageGrid"></div>
</div>
</div>

<div id="game-page" class="page">
<div class="header">
<button onclick="goBack()">✕</button>
<span id="queue-count"></span>
</div>

<div style="flex:1;display:flex;justify-content:center;align-items:center;">
<div class="card-wrapper" id="cardWrapper">
<div class="card-inner" id="cardInner">
<div class="card-face card-front">
<div class="word" id="en"></div>
</div>
<div class="card-face card-back">
<div class="meaning" id="kr"></div>
</div>
</div>
</div>
</div>

<div style="display:flex;justify-content:space-between;padding:20px;">
<button class="nav-btn" onclick="prevCard()">←</button>
<button class="nav-btn" onclick="nextCard()">→</button>
</div>
</div>

<!-- 완료 모달 -->
<div id="finish-modal" class="modal-overlay">
<div class="modal-box">
<div style="font-size:3rem;">🎉</div>
<h2>수고하셨습니다!</h2>
<p>챕터 완료</p>
<button class="nav-btn" onclick="closeFinishModal()">확인</button>
</div>
</div>

<script>
const physData={
1:[{en:"physics",kr:"물리학"},{en:"mechanics",kr:"역학"}]
};

let activeQueue=[];
let currentIndex=0;

function renderLobby(){
const grid=document.getElementById('stageGrid');
grid.innerHTML='';
for(let i=1;i<=1;i++){
const btn=document.createElement('div');
btn.className='stage-btn';
btn.innerText='Chapter '+i;
btn.onclick=()=>startChapter(i);
grid.appendChild(btn);
}
}
renderLobby();

function showPage(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function startChapter(num){
activeQueue=physData[num];
currentIndex=0;
updateCard();
showPage('game-page');
}

function updateCard(){
const c=activeQueue[currentIndex];
document.getElementById('en').innerText=c.en;
document.getElementById('kr').innerText=c.kr;
document.getElementById('queue-count').innerText=(currentIndex+1)+'/'+activeQueue.length;
}

function nextCard(){
if(currentIndex<activeQueue.length-1){
currentIndex++;
updateCard();
}else{
showFinishModal();
}
}

function prevCard(){
if(currentIndex>0){
currentIndex--;
updateCard();
}else{
bounce();
}
}

function bounce(){
const cw=document.getElementById('cardWrapper');
cw.style.transition='0.3s';
cw.style.transform='translateX(0)';
}

function goBack(){
showPage('lobby-page');
}

function showFinishModal(){
const m=document.getElementById('finish-modal');
m.style.display='flex';
setTimeout(()=>m.classList.add('visible'),10);
}

function closeFinishModal(){
const m=document.getElementById('finish-modal');
m.classList.remove('visible');
setTimeout(()=>{m.style.display='none';goBack();},300);
}
</script>

</body>
</html>
